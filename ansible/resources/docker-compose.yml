name: immich

# Immich requires four services to run: the server, the machine-learning
# container, a Redis-compatible cache (Valkey), and a PostgreSQL database with
# vector-search extensions. The server and ML containers alone will NOT start.
#
# Secrets (the DB password) live in a sibling `.env` file — copy `.env.example`
# to `.env` and fill it in. `.env` is gitignored; never commit it.
#
# Image tags below were verified against the upstream Immich compose at its
# v3.0.2 release tag (github.com/immich-app/immich/blob/v3.0.2/docker/
# docker-compose.yml) on 2026-07-14. IMMICH_VERSION is pinned in .env. The
# postgres/valkey tags track upstream — re-check them when bumping Immich
# (at a MAJOR bump, diff this file against upstream's release compose).
# linuxserver/syncthing is pinned to a stable ls tag.

# Cap container JSON logs so they can't grow unbounded on the LXC boot disk
# (rootfs is on local-lvm, NOT the encrypted volume). Without this, Docker's
# default json-file driver keeps every log line forever. 10m x 3 files = 30 MB
# max per container. Applied to every service below via the *default-logging
# anchor. immich-server is the chatty one this primarily reins in.
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  immich-server:
    <<: *default-logging
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      # /data is the media location since Immich v3 (the legacy
      # /usr/src/app/upload fallback was removed with the v2 deprecations).
      - /mnt/storage/immich_data:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    devices:
      - /dev/dri:/dev/dri # Intel QuickSync video transcoding
    ports:
      - "2283:2283"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always

  immich-machine-learning:
    <<: *default-logging
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    volumes:
      - immich-model-cache:/cache
    env_file:
      - .env
    devices:
      - /dev/dri:/dev/dri # Intel iGPU AI facial recognition acceleration
    restart: always

  redis:
    <<: *default-logging
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    <<: *default-logging
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /mnt/storage/immich_db:/var/lib/postgresql/data
    # Docker's default 64 MB /dev/shm can starve Postgres during vacuum/index
    # work; matches the upstream Immich compose.
    shm_size: 128mb
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: always

  syncthing:
    <<: *default-logging
    image: lscr.io/linuxserver/syncthing:v2.1.2-ls224
    container_name: syncthing
    # Pin the service uid/gid so it maps to host 100911 under the unprivileged
    # LXC id-shift (matches the syncthing_share chown in 04_provision_docker_lxc.yaml).
    environment:
      - PUID=911
      - PGID=911
    volumes:
      - /mnt/storage/syncthing_data:/config         # Syncthing state (DB, keys, certs)
      - /mnt/storage/syncthing_share:/data          # User-synced data; folder paths live under /data
    ports:
      - "8384:8384" # Admin GUI Port
      - "22000:22000/tcp"
    restart: always

  # Reverse proxy + in-home HTTPS. Terminates TLS for the LAN with a Let's
  # Encrypt wildcard cert obtained via ACME DNS-01 (OVH) and auto-renewed.
  # Built from ./caddy/Dockerfile because the stock image has no DNS plugins.
  # Routes by hostname to the apps above (see ./caddy/Caddyfile). The direct
  # app ports (2283/8384) stay published as a cutover fallback.
  caddy:
    <<: *default-logging
    container_name: caddy
    build: ./caddy
    env_file:
      # OVH DNS-01 credentials — placed on the ENCRYPTED volume by
      # 05_deploy_docker_stack.yaml (the compose dir sits on the container's
      # unencrypted rootfs, and this secret is valuable beyond the box).
      # Absolute path, read by compose at `up` time — which only ever happens
      # after the LUKS unlock (the deploy/update playbooks guard on it).
      - /mnt/storage/secrets/caddy.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # ACME account + cert private keys live on the encrypted volume (at-rest
      # protection). Caddy only runs after the manual LUKS unlock anyway.
      - /mnt/storage/caddy_data:/data
      - caddy-config:/config
    restart: always

volumes:
  immich-model-cache:
  caddy-config:
