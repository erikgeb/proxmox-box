---
- name: Post-Reboot Secure Storage Unlock
  hosts: proxmox
  gather_facts: no
  remote_user: ansible-worker
  become: yes

  vars_prompt:
    - name: unlock_passphrase
      prompt: "Enter the LUKS Master Passphrase to unlock the secure storage"
      private: yes

  vars:
    target_partition: /dev/sda1
    mapper_name: ssdcrypt_data
    mount_path: /mnt/pve/secure-storage
    docker_container_id: 100
    vaultwarden_container_id: 101

  tasks:
    - name: Open the LUKS encrypted container
      community.crypto.luks_device:
        device: "{{ target_partition }}"
        name: "{{ mapper_name }}"
        state: opened
        passphrase: "{{ unlock_passphrase }}"

    - name: Mount the secure storage volume
      ansible.posix.mount:
        path: "{{ mount_path }}"
        src: "/dev/mapper/{{ mapper_name }}"
        fstype: ext4
        opts: defaults,noauto
        state: mounted

    - name: Refresh Proxmox storage status to detect the mount
      ansible.builtin.command:
        cmd: pvesm status
      changed_when: false

    - name: Display Unlock Success Message
      ansible.builtin.debug:
        msg: "Secure storage unlocked and successfully mounted to {{ mount_path }}. You may now start your dependent VMs/Containers."

    - name: Boot Docker Environment Container
      become: yes
      ansible.builtin.command: pct start "{{ docker_container_id }}"

    - name: Boot Isolated Vaultwarden Container
      become: yes
      ansible.builtin.command: pct start "{{ vaultwarden_container_id }}"
