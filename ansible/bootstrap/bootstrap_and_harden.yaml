---
- name: Safety Check Host Parameter
  hosts: localhost
  gather_facts: no
  
  tasks:
    - name: Check for target_host parameter
      ansible.builtin.debug:
        msg: "No target_host specified. Exiting playbook gracefully."
      when: target_host is undefined

    - name: End play gracefully if target_host is missing
      ansible.builtin.meta: end_play
      when: target_host is undefined

- name: Bootstrap and Create Dedicated Ansible Service Account
  hosts: "{{ target_host }}"
  gather_facts: no
  remote_user: root

  vars:
    # Change 'ansible-worker' to whatever username you prefer
    automation_user: "ansible-worker"

  tasks:
    - name: Update Proxmox 9 and Ceph DEB822 sources to No-Subscription
      ansible.builtin.raw: |
        # 1. Disable PVE Enterprise source block safely
        if [ -f /etc/apt/sources.list.d/pve-enterprise.sources ]; then
          sed -i 's/Enabled: true/Enabled: no/g' /etc/apt/sources.list.d/pve-enterprise.sources
        fi

        # 2. Disable Ceph Enterprise source block safely
        if [ -f /etc/apt/sources.list.d/ceph.sources ]; then
          sed -i 's/Enabled: true/Enabled: no/g' /etc/apt/sources.list.d/ceph.sources
        fi

        # 3. Create the Free PVE No-Subscription DEB822 file if it doesn't exist
        if [ ! -f /etc/apt/sources.list.d/pve-no-subscription.sources ]; then
          cat << 'EOF' > /etc/apt/sources.list.d/pve-no-subscription.sources
        Types: deb
        URIs: http://download.proxmox.com/debian/pve
        Suites: trixie
        Components: pve-no-subscription
        Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
        Enabled: true
        EOF
        fi

        # 4. Create the Free Ceph Squid No-Subscription DEB822 file if it doesn't exist
        if [ ! -f /etc/apt/sources.list.d/ceph-no-subscription.sources ]; then
          cat << 'EOF' > /etc/apt/sources.list.d/ceph-no-subscription.sources
        Types: deb
        URIs: http://download.proxmox.com/debian/ceph-squid
        Suites: trixie
        Components: no-subscription
        Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
        Enabled: true
        EOF
        fi
      changed_when: true

    - name: Clean apt, update, and install Python 3
      ansible.builtin.raw: |
        apt-get clean
        apt-get update -y
        apt-get install -y python3 python3-pip python3-proxmoxer sudo
      changed_when: true

    - name: Gather facts to verify Python is working
      ansible.builtin.setup:

    # -------------------------------------------------------------------------
    # STEP 2: CREATE SERVICE ACCOUNT & SSH ACCESS
    # -------------------------------------------------------------------------
    - name: Create the dedicated automation system user
      ansible.builtin.user:
        name: "{{ automation_user }}"
        shell: /bin/bash
        state: present

    - name: Deploy local SSH public key to the new automation user
      ansible.builtin.authorized_key:
        user: "{{ automation_user }}"
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519_ansible.pub') }}" 

    - name: Configure passwordless sudo for the automation user
      ansible.builtin.copy:
        content: "{{ automation_user }} ALL=(ALL) NOPASSWD:ALL"
        dest: "/etc/sudoers.d/{{ automation_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    # -------------------------------------------------------------------------
    # STEP 3: SECURITY HARDENING (DISABLE ROOT SSH)
    # -------------------------------------------------------------------------
    - name: Disable Root SSH Login for security
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted